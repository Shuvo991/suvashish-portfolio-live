<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Test — Variant 4: Innovation Helix</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #070709;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    .label {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; color: rgba(240,180,41,0.6);
      z-index: 10; pointer-events: none; white-space: nowrap;
    }
    .hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(152,152,168,0.5); letter-spacing: .08em;
      z-index: 10; pointer-events: none;
    }
    canvas { display: block; position: fixed; inset: 0; }
  </style>
</head>
<body>
  <span class="label">Variant 4 — Innovation Helix · Move your mouse</span>
  <span class="hint">Represents: Continuous iteration & upward growth</span>
  <canvas id="c"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Tokens ────────────────────────────────────────────── */
    const GOLD    = 0xF0B429;
    const VIOLET  = 0xA78BFA;
    const BLUE    = 0x60A5FA;
    const EMERALD = 0x34D399;
    const BG      = 0x070709;

    /* ── Renderer ──────────────────────────────────────────── */
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(BG, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 9);

    scene.fog = new THREE.FogExp2(BG, 0.042);

    /* ── Lights ────────────────────────────────────────────── */
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const goldPt   = new THREE.PointLight(GOLD, 4.5, 16);
    goldPt.position.set(3, 1, 4);
    scene.add(goldPt);
    const violetPt = new THREE.PointLight(VIOLET, 2, 12);
    violetPt.position.set(-3, -2, 3);
    scene.add(violetPt);
    const emeraldPt = new THREE.PointLight(EMERALD, 1.5, 10);
    emeraldPt.position.set(0, 3, -2);
    scene.add(emeraldPt);

    /* ── Helix parameters ──────────────────────────────────── */
    const TURNS      = 4;         // number of full turns
    const NODES_PER_TURN = 10;    // nodes per turn per strand
    const TOTAL_NODES = TURNS * NODES_PER_TURN;
    const HELIX_H    = 6.5;       // total height of helix
    const HELIX_R    = 1.2;       // radius of helix

    const helixGroup = new THREE.Group();
    scene.add(helixGroup);

    /* Alternate node colours across both strands */
    const strandColors = [
      [GOLD, BLUE, GOLD, VIOLET, GOLD, BLUE, GOLD, EMERALD, GOLD, VIOLET],
      [VIOLET, GOLD, BLUE, GOLD, EMERALD, GOLD, VIOLET, GOLD, BLUE, GOLD],
    ];

    const strand1Nodes = [];
    const strand2Nodes = [];
    const crossBars    = [];

    for (let i = 0; i < TOTAL_NODES; i++) {
      const frac  = i / (TOTAL_NODES - 1);
      const angle = frac * TURNS * Math.PI * 2;
      const y     = frac * HELIX_H - HELIX_H / 2;

      /* Strand 1 */
      const x1 = Math.cos(angle) * HELIX_R;
      const z1 = Math.sin(angle) * HELIX_R;

      /* Strand 2 — offset by π */
      const x2 = Math.cos(angle + Math.PI) * HELIX_R;
      const z2 = Math.sin(angle + Math.PI) * HELIX_R;

      const colorIdx = i % 10;
      const col1 = new THREE.Color(strandColors[0][colorIdx]);
      const col2 = new THREE.Color(strandColors[1][colorIdx]);

      /* Node spheres */
      const makeNode = (x, z, col) => {
        const geo  = new THREE.SphereGeometry(0.1, 12, 12);
        const mat  = new THREE.MeshStandardMaterial({
          color: col, emissive: col, emissiveIntensity: 0.55,
          roughness: 0.25, metalness: 0.75,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        helixGroup.add(mesh);
        return mesh;
      };

      strand1Nodes.push(makeNode(x1, z1, col1));
      strand2Nodes.push(makeNode(x2, z2, col2));

      /* Cross-bar connecting the two strands (every 2 nodes) */
      if (i % 2 === 0) {
        const dx = x2 - x1, dz = z2 - z1;
        const len = Math.sqrt(dx * dx + dz * dz);
        const barGeo = new THREE.CylinderGeometry(0.012, 0.012, len, 5);
        const barMat = new THREE.MeshBasicMaterial({
          color: GOLD, transparent: true, opacity: 0.22,
        });
        const bar = new THREE.Mesh(barGeo, barMat);
        bar.position.set((x1 + x2) / 2, y, (z1 + z2) / 2);
        bar.rotation.z = Math.PI / 2;
        bar.rotation.y = Math.atan2(dz, dx);
        helixGroup.add(bar);
        crossBars.push({ bar, baseOpacity: 0.15 + Math.random() * 0.2, phase: Math.random() * Math.PI * 2 });
      }
    }

    /* Strand backbone tubes */
    const makeTube = (nodes, col) => {
      const points = nodes.map(n => n.position.clone());
      const curve  = new THREE.CatmullRomCurve3(points);
      const geo    = new THREE.TubeGeometry(curve, TOTAL_NODES * 3, 0.022, 6, false);
      const mat    = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.4 });
      const mesh   = new THREE.Mesh(geo, mat);
      helixGroup.add(mesh);
      return mesh;
    };

    const tube1 = makeTube(strand1Nodes, GOLD);
    const tube2 = makeTube(strand2Nodes, VIOLET);

    /* ── Orbiting particles around the helix ───────────────── */
    const orbitParticles = [];
    for (let i = 0; i < 180; i++) {
      const frac  = Math.random();
      const angle = frac * TURNS * Math.PI * 2 + Math.random() * Math.PI * 2;
      const r     = HELIX_R + 0.4 + Math.random() * 1.4;
      const y     = frac * HELIX_H - HELIX_H / 2;
      const cols  = [GOLD, VIOLET, BLUE, EMERALD, 0xEEEEF5];
      const col   = cols[Math.floor(Math.random() * cols.length)];

      const geo  = new THREE.SphereGeometry(0.018, 5, 5);
      const mat  = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.2 + Math.random() * 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
      helixGroup.add(mesh);

      orbitParticles.push({
        mesh, angle, r,
        yBase: y,
        angSpeed: (Math.random() - 0.5) * 0.012,
        floatPhase: Math.random() * Math.PI * 2,
      });
    }

    /* ── Mouse ─────────────────────────────────────────────── */
    let mouseX = 0, mouseY = 0, camTX = 0, camTY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── Animation ─────────────────────────────────────────── */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      /* Camera */
      camTX += (mouseX * 0.9 - camTX) * 0.03;
      camTY += (-mouseY * 0.5 - camTY) * 0.03;
      camera.position.x = camTX;
      camera.position.y = camTY;
      camera.lookAt(0, 0, 0);

      /* Helix slow rotation */
      helixGroup.rotation.y = t * 0.18 + mouseX * 0.3;

      /* Crossbar pulse */
      crossBars.forEach((cb) => {
        cb.bar.material.opacity = cb.baseOpacity + Math.sin(t * 1.6 + cb.phase) * 0.12;
      });

      /* Node emissive pulse — travel wave up the helix */
      strand1Nodes.forEach((n, i) => {
        const wave = Math.sin(t * 2.0 - i * 0.35) * 0.3 + 0.55;
        n.material.emissiveIntensity = Math.max(0.1, wave);
      });
      strand2Nodes.forEach((n, i) => {
        const wave = Math.sin(t * 2.0 - i * 0.35 + Math.PI) * 0.3 + 0.55;
        n.material.emissiveIntensity = Math.max(0.1, wave);
      });

      /* Orbit particles */
      orbitParticles.forEach((p) => {
        p.angle += p.angSpeed;
        p.mesh.position.x = Math.cos(p.angle) * p.r;
        p.mesh.position.z = Math.sin(p.angle) * p.r;
        p.mesh.position.y = p.yBase + Math.sin(t * 0.5 + p.floatPhase) * 0.12;
      });

      /* Tube shimmer */
      tube1.material.opacity = 0.3 + Math.sin(t * 0.9) * 0.1;
      tube2.material.opacity = 0.3 + Math.sin(t * 0.9 + Math.PI) * 0.1;

      /* Lights */
      goldPt.position.x = Math.cos(t * 0.3) * 5;
      goldPt.position.z = Math.sin(t * 0.3) * 3 + 2;
      violetPt.position.x = Math.cos(t * 0.2 + Math.PI) * 4;
      violetPt.position.z = Math.sin(t * 0.2 + Math.PI) * 3;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
