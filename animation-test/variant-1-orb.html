<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Test — Variant 1: Gold Orb</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070709;
      color: #EEEEF5;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Label overlay */
    .label {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(240,180,41,0.6);
      z-index: 10;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(152,152,168,0.5);
      letter-spacing: .08em;
      z-index: 10;
      pointer-events: none;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }
  </style>
</head>
<body>

  <span class="label">Variant 1 — Floating Gold Orb · Move your mouse</span>
  <span class="hint">For integration into hero section of suvashishchky.pro</span>

  <canvas id="c"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Design tokens matching portfolio ─────────────────── */
    const GOLD        = 0xF0B429;
    const GOLD_DIM    = 0x6B4F10;
    const BG          = 0x070709;
    const T1          = 0xEEEEF5;
    const PARTICLE_CT = 320;

    /* ── Scene setup ───────────────────────────────────────── */
    const canvas   = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(BG, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    /* ── Lighting ──────────────────────────────────────────── */
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambientLight);

    const goldLight = new THREE.PointLight(GOLD, 3.5, 12);
    goldLight.position.set(2, 2, 3);
    scene.add(goldLight);

    const rimLight = new THREE.PointLight(0xA78BFA, 1.2, 10);
    rimLight.position.set(-3, -1, 2);
    scene.add(rimLight);

    const backLight = new THREE.PointLight(0x60A5FA, 0.8, 8);
    backLight.position.set(0, -3, -2);
    scene.add(backLight);

    /* ── Core orb group ────────────────────────────────────── */
    const orbGroup = new THREE.Group();
    scene.add(orbGroup);

    /* Inner solid sphere — dark glass */
    const innerGeo  = new THREE.IcosahedronGeometry(1, 4);
    const innerMat  = new THREE.MeshStandardMaterial({
      color: 0x0d0d14,
      metalness: 0.9,
      roughness: 0.1,
      envMapIntensity: 1,
    });
    const innerMesh = new THREE.Mesh(innerGeo, innerMat);
    orbGroup.add(innerMesh);

    /* Outer wireframe — gold */
    const wireGeo  = new THREE.IcosahedronGeometry(1.22, 1);
    const wireMat  = new THREE.MeshBasicMaterial({
      color: GOLD,
      wireframe: true,
      transparent: true,
      opacity: 0.35,
    });
    const wireMesh = new THREE.Mesh(wireGeo, wireMat);
    orbGroup.add(wireMesh);

    /* Second wireframe — slightly larger, slower rotation */
    const wire2Geo  = new THREE.OctahedronGeometry(1.55, 2);
    const wire2Mat  = new THREE.MeshBasicMaterial({
      color: GOLD,
      wireframe: true,
      transparent: true,
      opacity: 0.12,
    });
    const wire2Mesh = new THREE.Mesh(wire2Geo, wire2Mat);
    orbGroup.add(wire2Mesh);

    /* Ring / orbit band */
    const ringGeo = new THREE.TorusGeometry(1.7, 0.008, 6, 80);
    const ringMat = new THREE.MeshBasicMaterial({ color: GOLD, transparent: true, opacity: 0.45 });
    const ring1   = new THREE.Mesh(ringGeo, ringMat);
    ring1.rotation.x = Math.PI / 2.8;
    ring1.rotation.z = 0.4;
    orbGroup.add(ring1);

    const ring2   = new THREE.Mesh(
      new THREE.TorusGeometry(1.55, 0.005, 6, 80),
      new THREE.MeshBasicMaterial({ color: 0xA78BFA, transparent: true, opacity: 0.25 })
    );
    ring2.rotation.x = -Math.PI / 3;
    ring2.rotation.y = 0.6;
    orbGroup.add(ring2);

    /* ── Particles ─────────────────────────────────────────── */
    const particlePositions = new Float32Array(PARTICLE_CT * 3);
    const particleSpeeds    = [];

    for (let i = 0; i < PARTICLE_CT; i++) {
      const r     = 1.9 + Math.random() * 2.4;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);

      particlePositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      particlePositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      particlePositions[i * 3 + 2] = r * Math.cos(phi);

      particleSpeeds.push({
        theta: (Math.random() - 0.5) * 0.003,
        phi:   (Math.random() - 0.5) * 0.002,
        r:     1.9 + Math.random() * 2.4,
      });
    }

    const particleGeo  = new THREE.BufferGeometry();
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMat  = new THREE.PointsMaterial({
      color: GOLD,
      size: 0.032,
      transparent: true,
      opacity: 0.75,
      sizeAttenuation: true,
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    orbGroup.add(particles);

    /* Accent particles — white/cool */
    const accentPositions = new Float32Array(80 * 3);
    for (let i = 0; i < 80; i++) {
      const r     = 2.6 + Math.random() * 1.5;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      accentPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      accentPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      accentPositions[i * 3 + 2] = r * Math.cos(phi);
    }
    const accentGeo = new THREE.BufferGeometry();
    accentGeo.setAttribute('position', new THREE.BufferAttribute(accentPositions, 3));
    const accentParticles = new THREE.Points(accentGeo,
      new THREE.PointsMaterial({ color: 0xEEEEF5, size: 0.018, transparent: true, opacity: 0.4, sizeAttenuation: true })
    );
    orbGroup.add(accentParticles);

    /* ── Mouse parallax ────────────────────────────────────── */
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    /* ── Resize ────────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── Animation loop ────────────────────────────────────── */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      /* Smooth mouse follow */
      targetX += (mouseX * 0.4 - targetX) * 0.04;
      targetY += (mouseY * 0.3 - targetY) * 0.04;

      /* Orb rotations */
      orbGroup.rotation.y = t * 0.12 + targetX * 0.6;
      orbGroup.rotation.x = Math.sin(t * 0.08) * 0.15 + targetY * 0.4;

      /* Wireframes counter-rotate for tension */
      wireMesh.rotation.y  = -t * 0.18;
      wireMesh.rotation.z  =  t * 0.07;
      wire2Mesh.rotation.x =  t * 0.09;
      wire2Mesh.rotation.z = -t * 0.05;

      /* Rings orbit */
      ring1.rotation.z = t * 0.22;
      ring2.rotation.y = -t * 0.16;

      /* Gentle float */
      orbGroup.position.y = Math.sin(t * 0.6) * 0.08;

      /* Pulse gold light */
      goldLight.intensity = 3.2 + Math.sin(t * 1.2) * 0.5;
      goldLight.position.x = Math.cos(t * 0.4) * 2.5;
      goldLight.position.y = Math.sin(t * 0.3) * 1.5 + 1;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
