<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Test — Variant 2: Data Network</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070709;
      color: #EEEEF5;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .label {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(240,180,41,0.6);
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
    }

    .hint {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(152,152,168,0.5);
      letter-spacing: .08em;
      z-index: 10;
      pointer-events: none;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }
  </style>
</head>
<body>

  <span class="label">Variant 2 — Data Network · Move your mouse</span>
  <span class="hint">For integration into hero section of suvashishchky.pro</span>

  <canvas id="c"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    /* ── Design tokens ─────────────────────────────────────── */
    const GOLD     = new THREE.Color(0xF0B429);
    const VIOLET   = new THREE.Color(0xA78BFA);
    const BLUE     = new THREE.Color(0x60A5FA);
    const WHITE    = new THREE.Color(0xEEEEF5);
    const BG       = 0x070709;

    const NODE_COUNT = 55;
    const CONNECT_DIST = 2.4;

    /* ── Renderer ──────────────────────────────────────────── */
    const canvas   = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(BG, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 9);

    /* ── Fog for depth ─────────────────────────────────────── */
    scene.fog = new THREE.FogExp2(BG, 0.055);

    /* ── Lights ────────────────────────────────────────────── */
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const goldPt = new THREE.PointLight(0xF0B429, 4, 15);
    goldPt.position.set(3, 2, 4);
    scene.add(goldPt);

    /* ── Nodes ─────────────────────────────────────────────── */
    const nodes = [];
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    /* Node size tiers — a few large hubs, many small leaves */
    const tiers = [
      { r: 0.18, color: GOLD,   count: 4  },   // hub nodes — gold
      { r: 0.10, color: WHITE,  count: 12 },   // mid nodes — white
      { r: 0.055, color: VIOLET, count: 18 },  // small — violet
      { r: 0.038, color: BLUE,  count: 21 },   // tiny — blue
    ];

    tiers.forEach(({ r, color, count }) => {
      for (let i = 0; i < count; i++) {
        const geo  = new THREE.SphereGeometry(r, 10, 10);
        const mat  = new THREE.MeshStandardMaterial({
          color,
          emissive: color,
          emissiveIntensity: r > 0.12 ? 0.6 : 0.3,
          roughness: 0.3,
          metalness: 0.7,
        });
        const mesh = new THREE.Mesh(geo, mat);

        /* Spread within a soft sphere volume */
        const spread = 4.5;
        let x, y, z, dist;
        do {
          x = (Math.random() - 0.5) * spread * 2;
          y = (Math.random() - 0.5) * spread * 2;
          z = (Math.random() - 0.5) * spread;
          dist = Math.sqrt(x*x + y*y + z*z);
        } while (dist > spread || dist < 0.5);

        mesh.position.set(x, y, z);
        nodeGroup.add(mesh);

        nodes.push({
          mesh,
          origin: new THREE.Vector3(x, y, z),
          vel: new THREE.Vector3(
            (Math.random() - 0.5) * 0.008,
            (Math.random() - 0.5) * 0.008,
            (Math.random() - 0.5) * 0.004,
          ),
          phase: Math.random() * Math.PI * 2,
        });
      }
    });

    /* ── Connection lines ──────────────────────────────────── */
    /* We rebuild lines each frame using a LineSegments approach */
    const maxLines     = NODE_COUNT * NODE_COUNT;
    const linePositions = new Float32Array(maxLines * 6);
    const lineColors    = new Float32Array(maxLines * 6);

    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3).setUsage(THREE.DynamicDrawUsage));
    lineGeo.setAttribute('color',    new THREE.BufferAttribute(lineColors,    3).setUsage(THREE.DynamicDrawUsage));

    const lineMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.55,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const lines = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines);

    /* ── Pulse ring on hub nodes ───────────────────────────── */
    const hubNodes = nodes.slice(0, 4);

    /* ── Mouse ─────────────────────────────────────────────── */
    let mouseX = 0, mouseY = 0;
    let camTargetX = 0, camTargetY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    /* ── Resize ────────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── Helpers ───────────────────────────────────────────── */
    const tmpColor = new THREE.Color();
    const goldC    = new THREE.Color(0xF0B429);
    const dimC     = new THREE.Color(0x1a1020);

    function lerpColor(a, b, t) {
      tmpColor.copy(a).lerp(b, t);
      return tmpColor;
    }

    /* ── Animation loop ────────────────────────────────────── */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      /* Camera drift from mouse */
      camTargetX += (mouseX * 0.8 - camTargetX) * 0.03;
      camTargetY += (-mouseY * 0.5 - camTargetY) * 0.03;
      camera.position.x = camTargetX;
      camera.position.y = camTargetY;
      camera.lookAt(0, 0, 0);

      /* Slow global rotation */
      nodeGroup.rotation.y = t * 0.05;

      /* Move nodes */
      nodes.forEach((n, i) => {
        const s = t * 0.4 + n.phase;
        n.mesh.position.x = n.origin.x + Math.sin(s * 0.7) * 0.18 + n.vel.x * t * 0.5;
        n.mesh.position.y = n.origin.y + Math.cos(s * 0.5) * 0.15 + n.vel.y * t * 0.5;
        n.mesh.position.z = n.origin.z + Math.sin(s * 0.3) * 0.10;

        /* Clamp drift */
        const d = n.mesh.position.length();
        if (d > 5) n.mesh.position.multiplyScalar(5 / d);
      });

      /* Pulse emissive on hub nodes */
      hubNodes.forEach((n, i) => {
        n.mesh.material.emissiveIntensity = 0.5 + Math.sin(t * 1.5 + i * 1.3) * 0.35;
      });

      /* Rebuild connection lines */
      let lineIdx = 0;
      const posAttr   = lineGeo.attributes.position;
      const colorAttr = lineGeo.attributes.color;

      for (let a = 0; a < nodes.length; a++) {
        for (let b = a + 1; b < nodes.length; b++) {
          const dist = nodes[a].mesh.position.distanceTo(nodes[b].mesh.position);
          if (dist < CONNECT_DIST && lineIdx < maxLines) {
            const alpha = 1 - (dist / CONNECT_DIST);
            const c     = lerpColor(dimC, goldC, alpha * 0.7);

            const i6 = lineIdx * 6;
            posAttr.array[i6]     = nodes[a].mesh.position.x;
            posAttr.array[i6 + 1] = nodes[a].mesh.position.y;
            posAttr.array[i6 + 2] = nodes[a].mesh.position.z;
            posAttr.array[i6 + 3] = nodes[b].mesh.position.x;
            posAttr.array[i6 + 4] = nodes[b].mesh.position.y;
            posAttr.array[i6 + 5] = nodes[b].mesh.position.z;

            colorAttr.array[i6]     = c.r;
            colorAttr.array[i6 + 1] = c.g;
            colorAttr.array[i6 + 2] = c.b;
            colorAttr.array[i6 + 3] = c.r;
            colorAttr.array[i6 + 4] = c.g;
            colorAttr.array[i6 + 5] = c.b;

            lineIdx++;
          }
        }
      }

      /* Zero out unused segments */
      for (let i = lineIdx; i < maxLines; i++) {
        const i6 = i * 6;
        for (let k = 0; k < 6; k++) {
          posAttr.array[i6 + k]   = 0;
          colorAttr.array[i6 + k] = 0;
        }
      }

      posAttr.needsUpdate   = true;
      colorAttr.needsUpdate = true;
      lineGeo.setDrawRange(0, lineIdx * 2);

      /* Gold light orbit */
      goldPt.position.x = Math.cos(t * 0.3) * 5;
      goldPt.position.y = Math.sin(t * 0.2) * 3;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
