name: Deploy to Public Repo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Push static files to public repo
        run: |
          git config --global user.name "Suvashish Chakraborty"
          git config --global user.email "suvashish991@gmail.com"

          git clone https://x-access-token:${{ secrets.PORTFOLIO_DEPLOY }}@github.com/Shuvo991/suvashish-portfolio-live.git deploy

          # Sync everything except files that should not be public
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='animation-test' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            ./ deploy/

          cd deploy
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M')"
          git push
